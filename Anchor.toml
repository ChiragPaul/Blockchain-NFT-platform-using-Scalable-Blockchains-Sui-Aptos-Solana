[toolchain]
package_manager = "yarn"        # Use yarn for JS dependencies

[features]
resolution = true               # Enable dependency resolution
skip-lint = false               # Run linting checks on build

[programs.localnet]             # Program ID for localnet
solana_counter = "4szpqSfn4XeXMDtabp7hrcXiWQ5PMgePxPTjKgEVDfcm"

[programs.devnet]               # Program ID for devnet
solana_counter = "4szpqSfn4XeXMDtabp7hrcXiWQ5PMgePxPTjKgEVDfcm"

[registry]
url = "https://api.apr.dev"     # Anchor program registry URL

[provider]
cluster = "devnet"              # Target network (devnet/localnet/mainnet)
wallet = "~/.config/solana/id.json"  # Path to signing keypair

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 \"tests/**/*.ts\""
